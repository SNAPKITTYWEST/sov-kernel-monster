# cbindgen configuration for QATAAUM IBM i FFI

language = "C"
include_guard = "QATAAUM_IBMI_FFI_H"
pragma_once = true
autogen_warning = "/* Warning: This file is auto-generated by cbindgen. Do not modify. */"
include_version = true
namespace = "qataaum"
cpp_compat = true
documentation = true
documentation_style = "doxy"

[export]
include = ["QATAAUMExecutor", "QATAAUMJob", "QATAAUMReceipt", "QATAAUMPriority", "QATAAUMError"]

[export.rename]
"QATAAUMExecutor" = "QATAAUMExecutor"
"QATAAUMJob" = "QATAAUMJob"
"QATAAUMReceipt" = "QATAAUMReceipt"