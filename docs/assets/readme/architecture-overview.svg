  <text x="960" y="238" font-family="monospace" font-size="7"  fill="#806060" text-anchor="middle">MOCK BACKEND (Phase 1)</text>
  <text x="960" y="248" font-family="monospace" font-size="7"  fill="#ff4444" text-anchor="middle">Real hardware: Phase 2</text>

