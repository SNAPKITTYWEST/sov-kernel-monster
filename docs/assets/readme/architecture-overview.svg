  <text x="900" y="388" font-family="monospace" font-size="8" fill="#ffd700">TESTED</text>
  <rect x="882" y="395" width="12" height="8" rx="1" fill="#1a0808" stroke="#ff6644" stroke-width="1" stroke-dasharray="3,1"/>
