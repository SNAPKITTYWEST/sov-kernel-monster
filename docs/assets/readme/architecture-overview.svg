    </marker>
    <marker id="arr-green" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#44ff88" opacity="0.8"/>
    </marker>
  </defs>
  <rect width="1100" height="520" fill="#030810" rx="10"/>

  <!-- Title -->
  <text x="550" y="32" font-family="monospace" font-size="14" fill="#00e5ff" text-anchor="middle" font-weight="bold" filter="url(#g)">SOV-KERNEL-MONSTER — SYSTEM ARCHITECTURE</text>

  <!-- INPUT -->
  <rect x="430" y="50" width="240" height="40" rx="6" fill="#0a1628" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="550" y="66" font-family="monospace" font-size="10" fill="#00e5ff" text-anchor="middle" font-weight="bold">USER INPUT</text>
  <text x="550" y="80" font-family="monospace" font-size="8"  fill="#607080" text-anchor="middle">OpenQASM · Mathematical Workload · Agent Task</text>

  <!-- Arrow down to QATAAUM -->
