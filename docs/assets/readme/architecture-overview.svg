  <rect x="380" y="116" width="340" height="60" rx="6" fill="#0a1a2e" stroke="#ffd700" stroke-width="2"/>
  <text x="550" y="138" font-family="monospace" font-size="12" fill="#ffd700" text-anchor="middle" font-weight="bold" filter="url(#g)">QATAAUM — QUANTUM COMPILER</text>
