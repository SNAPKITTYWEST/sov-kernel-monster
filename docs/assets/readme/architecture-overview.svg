  <line x1="270" y1="252" x2="270" y2="300" stroke="#00ff88" stroke-width="1" opacity="0.5"/>
  <line x1="430" y1="252" x2="430" y2="300" stroke="#00ff88" stroke-width="1" opacity="0.5"/>
  <line x1="590" y1="252" x2="590" y2="300" stroke="#00ff88" stroke-width="1" opacity="0.5"/>
  <line x1="760" y1="252" x2="760" y2="300" stroke="#88ff88" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="300" x2="760" y2="300" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  <line x1="435" y1="300" x2="435" y2="320" stroke="#00ff88" stroke-width="1.5" marker-end="url(#arr-green)"/>

