  <rect x="882" y="410" width="12" height="8" rx="1" fill="#051508" stroke="#ff8844" stroke-width="1"/>
  <text x="900" y="418" font-family="monospace" font-size="8" fill="#ff8844">HARDWARE-TARGETED</text>
  <rect x="882" y="425" width="12" height="8" rx="1" fill="#050f18" stroke="#44ff88" stroke-width="1"/>
  <text x="900" y="433" font-family="monospace" font-size="8" fill="#44ff88">WORM SEALED</text>
  <text x="975" y="480" font-family="monospace" font-size="7" fill="#203040" text-anchor="middle">Ahmad Ali Parr</text>
  <text x="975" y="492" font-family="monospace" font-size="7" fill="#203040" text-anchor="middle">SnapKitty Collective</text>
